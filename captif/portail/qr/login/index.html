<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>BKM WIFI - QR SCANNER</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
    }
    .container {
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    .header h1 {
      font-size: 24px;
      color: #ff9800;
      margin-bottom: 5px;
    }
    .header p {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 20px;
    }
    .camera-box {
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid #ff9800;
      margin-bottom: 15px;
      position: relative;
      min-height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    video {
      width: 100% !important;
      height: auto !important;
      display: block;
    }
    .scan-line {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: #ff9800;
      animation: scan 2s linear infinite;
    }
    @keyframes scan {
      0% { bottom: 100%; }
      100% { bottom: 0%; }
    }
    .btn-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 20px;
      background: #333;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
    }
    .btn-primary {
      background: #ff9800;
      color: #000;
      font-weight: bold;
    }
    .status {
      background: rgba(0,0,0,0.6);
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 15px;
    }
    .status.success { background: #2e7d32; }
    .status.error { background: #c62828; }
    .status.warning { background: #ff9800; color: #000; }
    .manual-input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 30px;
      text-align: center;
      font-size: 16px;
      font-family: monospace;
      margin-bottom: 10px;
    }
    .footer {
      margin-top: 20px;
      font-size: 10px;
      color: #666;
    }
    canvas { display: none; }
    .info-box {
      background: rgba(0,0,0,0.5);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 15px;
      font-size: 11px;
      color: #ff9800;
      word-break: break-all;
    }
    .debug {
      font-size: 10px;
      color: #888;
      margin-top: 10px;
      padding: 8px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📷 BKM SCANNER</h1>
    <p>Scannez votre QR code ticket</p>
  </div>

  <div class="info-box" id="gatewayInfo">
    🔐 Chargement...
  </div>

  <div class="camera-box" id="cameraBox">
    <video id="video" playsinline muted autoplay></video>
    <div class="scan-line"></div>
  </div>

  <div class="btn-group">
    <button class="btn" id="reloadBtn">⟳ Recharger</button>
    <button class="btn btn-primary" id="manualBtn">✏️ Saisie manuelle</button>
  </div>

  <div class="status" id="status">🔍 Initialisation caméra...</div>

  <div id="manualArea" style="display:none;">
    <input type="text" id="manualCode" class="manual-input" placeholder="Entrez le code ticket" autocomplete="off">
    <button class="btn btn-primary" id="submitManual" style="width:100%;">✓ VALIDER</button>
  </div>

  <div class="debug" id="debugInfo">
    📡 Debug: En attente...
  </div>

  <div class="footer">BKM WIFI ZONE</div>
</div>
<canvas id="canvas" width="640" height="480"></canvas>

<script>
  // ========== RÉCUPÉRATION DE LA PASSERELLE ==========
  const urlParams = new URLSearchParams(window.location.search);
  let GATEWAY_URL = urlParams.get('gateway');
  
  if (!GATEWAY_URL) {
    document.getElementById('gatewayInfo').innerHTML = "❌ Erreur: Aucune passerelle spécifiée";
    document.getElementById('gatewayInfo').style.color = "#ff4444";
  } else {
    document.getElementById('gatewayInfo').innerHTML = "🔐 Passerelle: " + GATEWAY_URL;
  }
  
  const LOGIN_URL = GATEWAY_URL ? GATEWAY_URL + "/login.html" : null;
  
  let video = document.getElementById('video');
  let statusDiv = document.getElementById('status');
  let debugDiv = document.getElementById('debugInfo');
  let stream = null;
  let scanning = true;
  let animationId = null;
  let manualMode = false;

  function updateDebug(msg) {
    console.log(msg);
    debugDiv.innerHTML = "📡 " + msg;
  }

  // ========== VÉRIFICATION HTTPS ==========
  updateDebug("Protocole: " + window.location.protocol);
  if (window.location.protocol !== 'https:') {
    statusDiv.innerHTML = "⚠️ ATTENTION: Vous n'êtes pas en HTTPS! La caméra peut être bloquée.";
    statusDiv.className = "status warning";
    updateDebug("⚠️ Le site doit être en HTTPS pour utiliser la caméra");
  }

  // ========== VÉRIFICATION SUPPORT CAMÉRA ==========
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    statusDiv.innerHTML = "❌ Votre navigateur ne supporte pas la caméra";
    statusDiv.className = "status error";
    updateDebug("API getUserMedia non supportée");
  }

  // ========== CAMÉRA ==========
  async function startCamera() {
    updateDebug("Demande d'accès à la caméra...");
    
    // Essayer différentes configurations
    const constraintsList = [
      { video: { facingMode: { exact: "environment" } } },  // Caméra arrière
      { video: { facingMode: "environment" } },              // Caméra arrière (soft)
      { video: true }                                         // Caméra par défaut
    ];
    
    for (let constraints of constraintsList) {
      try {
        updateDebug("Essai: " + JSON.stringify(constraints));
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        updateDebug("✅ Caméra obtenue !");
        return stream;
      } catch(e) {
        updateDebug("Échec: " + e.name + " - " + e.message);
      }
    }
    
    throw new Error("Aucune caméra disponible");
  }

  async function initScanner() {
    try {
      const mediaStream = await startCamera();
      video.srcObject = mediaStream;
      
      // Attendre que la vidéo soit prête
      await new Promise((resolve) => {
        video.onloadedmetadata = () => {
          updateDebug("Vidéo chargée: " + video.videoWidth + "x" + video.videoHeight);
          resolve();
        };
        setTimeout(resolve, 2000);
      });
      
      await video.play();
      updateDebug("Lecture vidéo démarrée");
      
      statusDiv.innerHTML = "✅ Caméra active - Scannez le QR code";
      statusDiv.className = "status";
      scanning = true;
      scanFrame();
    } catch(err) {
      updateDebug("ERREUR: " + err.message);
      statusDiv.innerHTML = "❌ " + err.message + " - Utilisez la saisie manuelle";
      statusDiv.className = "status error";
      scanning = false;
      document.getElementById('manualArea').style.display = 'block';
    }
  }

  function scanFrame() {
    if (!scanning || manualMode) return;
    
    if (video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, canvas.width, canvas.height, {
        inversionAttempts: "dontInvert",
      });
      if (code && code.data && code.data.trim().length > 0) {
        updateDebug("QR détecté: " + code.data);
        onTicketDetected(code.data.trim());
        return;
      }
    }
    
    animationId = requestAnimationFrame(scanFrame);
  }

  function onTicketDetected(ticket) {
    if (!scanning) return;
    scanning = false;
    if (animationId) cancelAnimationFrame(animationId);
    if (stream) stream.getTracks().forEach(t => t.stop());
    
    statusDiv.innerHTML = "✅ Ticket: " + ticket + " → Connexion...";
    statusDiv.className = "status success";
    updateDebug("Redirection vers: " + LOGIN_URL + "?username=" + ticket);
    
    if (!GATEWAY_URL) {
      statusDiv.innerHTML = "❌ Erreur: Passerelle non trouvée";
      statusDiv.className = "status error";
      return;
    }
    
    setTimeout(() => {
      window.location.href = LOGIN_URL + "?username=" + encodeURIComponent(ticket);
    }, 500);
  }

  function manualSubmit() {
    const code = document.getElementById('manualCode').value.trim();
    if (code.length === 0) {
      statusDiv.innerHTML = "⚠️ Entrez un code valide";
      statusDiv.className = "status error";
      return;
    }
    onTicketDetected(code);
  }

  function hideManualMode() {
    manualMode = false;
    document.getElementById('manualArea').style.display = 'none';
    initScanner();
  }

  document.getElementById('reloadBtn').onclick = () => { location.reload(); };
  document.getElementById('manualBtn').onclick = () => {
    manualMode = true;
    if (stream) stream.getTracks().forEach(t => t.stop());
    document.getElementById('manualArea').style.display = 'block';
    statusDiv.innerHTML = "📝 Saisissez votre code ticket";
  };
  document.getElementById('submitManual').onclick = manualSubmit;
  document.getElementById('manualCode').onkeypress = (e) => { if (e.key === 'Enter') manualSubmit(); };

  // Démarrer
  initScanner();
</script>
</body>
</html>
