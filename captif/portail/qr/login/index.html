<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>BKM WIFI - QR SCANNER</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
    }
    .container {
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    .header h1 {
      font-size: 24px;
      color: #ff9800;
      margin-bottom: 5px;
    }
    .header p {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 20px;
    }
    .camera-box {
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid #ff9800;
      margin-bottom: 15px;
      position: relative;
    }
    video {
      width: 100% !important;
      height: auto !important;
      display: block;
    }
    .scan-line {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: #ff9800;
      animation: scan 2s linear infinite;
    }
    @keyframes scan {
      0% { bottom: 100%; }
      100% { bottom: 0%; }
    }
    .btn-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .btn {
      padding: 10px 20px;
      background: #333;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
    }
    .btn-primary {
      background: #ff9800;
      color: #000;
      font-weight: bold;
    }
    .status {
      background: rgba(0,0,0,0.6);
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 15px;
    }
    .status.success { background: #2e7d32; }
    .status.error { background: #c62828; }
    .manual-input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 30px;
      text-align: center;
      font-size: 16px;
      font-family: monospace;
      margin-bottom: 10px;
    }
    .footer {
      margin-top: 20px;
      font-size: 10px;
      color: #666;
    }
    canvas { display: none; }
    .info-box {
      background: rgba(0,0,0,0.5);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 15px;
      font-size: 11px;
      color: #ff9800;
      word-break: break-all;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📷 BKM SCANNER</h1>
    <p>Scannez votre QR code ticket</p>
  </div>

  <div class="info-box" id="gatewayInfo">
    🔐 Chargement...
  </div>

  <div class="camera-box">
    <video id="video" playsinline muted autoplay></video>
    <div class="scan-line"></div>
  </div>

  <div class="btn-group">
    <button class="btn" id="reloadBtn">⟳ Recharger</button>
    <button class="btn btn-primary" id="manualBtn">✏️ Saisie manuelle</button>
  </div>

  <div class="status" id="status">🔍 Initialisation caméra...</div>

  <div id="manualArea" style="display:none;">
    <input type="text" id="manualCode" class="manual-input" placeholder="Entrez le code ticket">
    <button class="btn btn-primary" id="submitManual" style="width:100%;">✓ VALIDER</button>
  </div>

  <div class="footer">BKM WIFI ZONE</div>
</div>
<canvas id="canvas" width="640" height="480"></canvas>

<script>
  // ========== RÉCUPÉRATION DU PARAMÈTRE gateway ==========
  const urlParams = new URLSearchParams(window.location.search);
  let GATEWAY_URL = urlParams.get('gateway');
  
  // Si pas de paramètre, essayer de détecter (fallback)
  if (!GATEWAY_URL) {
    GATEWAY_URL = window.location.protocol + "//" + window.location.hostname;
    document.getElementById('gatewayInfo').innerHTML = "⚠️ Aucune passerelle spécifiée<br>Détection automatique: " + GATEWAY_URL;
  } else {
    document.getElementById('gatewayInfo').innerHTML = "🔐 Passerelle: " + GATEWAY_URL;
  }
  
  // URL de la page login sur la passerelle
  const LOGIN_URL = GATEWAY_URL + "/login.html";
  
  console.log("Gateway: " + GATEWAY_URL);
  console.log("Login URL: " + LOGIN_URL);
  
  let video = document.getElementById('video');
  let statusDiv = document.getElementById('status');
  let stream = null;
  let scanning = true;
  let animationId = null;
  let manualMode = false;

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { exact: "environment" } }
      });
      return stream;
    } catch(e) {
      stream = await navigator.mediaDevices.getUserMedia({ video: true });
      return stream;
    }
  }

  async function initScanner() {
    try {
      const mediaStream = await startCamera();
      video.srcObject = mediaStream;
      await video.play();
      statusDiv.textContent = "✅ Caméra active - Scannez le QR code";
      statusDiv.className = "status";
      scanning = true;
      scanFrame();
    } catch(err) {
      statusDiv.textContent = "❌ " + err.message + " - Saisie manuelle";
      statusDiv.className = "status error";
      scanning = false;
      document.getElementById('manualArea').style.display = 'block';
    }
  }

  function scanFrame() {
    if (!scanning || manualMode) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(imageData.data, canvas.width, canvas.height, {
        inversionAttempts: "dontInvert",
      });
      if (code && code.data && code.data.trim().length > 0) {
        onTicketDetected(code.data.trim());
        return;
      }
    }
    animationId = requestAnimationFrame(scanFrame);
  }

  function onTicketDetected(ticket) {
    if (!scanning) return;
    scanning = false;
    if (animationId) cancelAnimationFrame(animationId);
    if (stream) stream.getTracks().forEach(t => t.stop());
    
    statusDiv.textContent = "✅ Ticket: " + ticket + " → Connexion...";
    statusDiv.className = "status success";
    
    // Redirection vers le portail captif avec le ticket
    window.location.href = LOGIN_URL + "?username=" + encodeURIComponent(ticket);
  }

  function manualSubmit() {
    const code = document.getElementById('manualCode').value.trim();
    if (code.length === 0) {
      statusDiv.textContent = "⚠️ Entrez un code valide";
      statusDiv.className = "status error";
      return;
    }
    onTicketDetected(code);
  }

  function hideManualMode() {
    manualMode = false;
    document.getElementById('manualArea').style.display = 'none';
    initScanner();
  }

  document.getElementById('reloadBtn').onclick = () => { location.reload(); };
  document.getElementById('manualBtn').onclick = () => {
    manualMode = true;
    if (stream) stream.getTracks().forEach(t => t.stop());
    document.getElementById('manualArea').style.display = 'block';
    statusDiv.textContent = "📝 Saisissez votre code ticket";
  };
  document.getElementById('retryCam').onclick = (e) => {
    e.preventDefault();
    hideManualMode();
  };
  document.getElementById('submitManual').onclick = manualSubmit;
  document.getElementById('manualCode').onkeypress = (e) => { if (e.key === 'Enter') manualSubmit(); };

  initScanner();
</script>
</body>
</html>
