<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>BKM WIFI - QR SCANNER</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
      color: white;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 15px;
    }
    .container {
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    .header h1 {
      font-size: 24px;
      color: #ff9800;
      margin-bottom: 5px;
    }
    .header p {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 20px;
    }
    .camera-box {
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid #ff9800;
      margin-bottom: 15px;
      position: relative;
      min-height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    video {
      width: 100% !important;
      height: auto !important;
      display: block;
    }
    .scan-line {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: #ff9800;
      animation: scan 2s linear infinite;
      pointer-events: none;
    }
    @keyframes scan {
      0% { bottom: 100%; }
      100% { bottom: 0%; }
    }
    .btn-group {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .btn {
      padding: 12px 24px;
      background: #333;
      color: white;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.3s;
    }
    .btn:active {
      transform: scale(0.96);
    }
    .btn-primary {
      background: #ff9800;
      color: #000;
      font-weight: bold;
    }
    .btn-primary:hover {
      background: #e68900;
    }
    .status {
      background: rgba(0,0,0,0.6);
      padding: 12px;
      border-radius: 12px;
      font-size: 13px;
      margin-bottom: 15px;
      transition: all 0.3s;
    }
    .status.success { background: #2e7d32; }
    .status.error { background: #c62828; }
    .status.warning { background: #ff9800; color: #000; }
    .status.info { background: #2196f3; }
    .manual-input {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 30px;
      text-align: center;
      font-size: 16px;
      font-family: monospace;
      margin-bottom: 10px;
      background: white;
    }
    .footer {
      margin-top: 20px;
      font-size: 10px;
      color: #666;
    }
    canvas { display: none; }
    .info-box {
      background: rgba(0,0,0,0.5);
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 15px;
      font-size: 11px;
      color: #ff9800;
      word-break: break-all;
    }
    .gateway-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .gateway-btn {
      background: rgba(255,152,0,0.2);
      border: 1px solid #ff9800;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      color: white;
      transition: all 0.3s;
    }
    .gateway-btn:active {
      transform: scale(0.95);
      background: rgba(255,152,0,0.4);
    }
    .back-link {
      display: inline-block;
      margin-top: 10px;
      color: #ff9800;
      text-decoration: none;
      font-size: 12px;
      cursor: pointer;
    }
    .camera-placeholder {
      padding: 40px;
      text-align: center;
      color: #666;
    }
  </style>
  <script src="jsQR.min.js"></script>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📷 BKM SCANNER</h1>
    <p>Scannez votre QR code ticket</p>
  </div>

  <div class="info-box" id="gatewayInfo">
    🔍 Recherche de la passerelle...
  </div>

  <div class="gateway-buttons" id="gatewayButtons" style="display:none;">
    <button class="gateway-btn" data-ip="192.168.1.1">192.168.1.1</button>
    <button class="gateway-btn" data-ip="192.168.0.1">192.168.0.1</button>
    <button class="gateway-btn" data-ip="10.10.10.1">10.10.10.1</button>
    <button class="gateway-btn" data-ip="172.16.0.1">172.16.0.1</button>
    <button class="gateway-btn" data-ip="autre">Autre...</button>
  </div>

  <div class="camera-box" id="cameraBox">
    <video id="video" playsinline muted autoplay style="width:100%; height:auto;"></video>
    <div class="scan-line"></div>
  </div>

  <div class="btn-group">
    <button class="btn" id="reloadBtn">⟳ Recharger</button>
    <button class="btn btn-primary" id="manualBtn">✏️ Saisie manuelle</button>
  </div>

  <div class="status" id="status">🔍 Initialisation caméra...</div>

  <div id="manualArea" style="display:none;">
    <input type="text" id="manualCode" class="manual-input" placeholder="Entrez le code ticket" autocomplete="off">
    <button class="btn btn-primary" id="submitManual" style="width:100%; margin-top:5px;">✓ VALIDER</button>
    <button class="back-link" id="backToScanBtn">← Retour au scanner</button>
  </div>

  <div class="footer">BKM WIFI ZONE</div>
</div>
<canvas id="canvas" width="640" height="480"></canvas>

<script>
  let GATEWAY_URL = null;
  let video = document.getElementById('video');
  let statusDiv = document.getElementById('status');
  let stream = null;
  let scanning = true;
  let animationId = null;
  let manualMode = false;
  let scanRequestId = null;

  // ========== 1. TENTER DE RÉCUPÉRER L'IP DEPUIS L'URL ==========
  const urlParams = new URLSearchParams(window.location.search);
  let gatewayFromUrl = urlParams.get('gateway');
  
  // ========== 2. TENTER DE RÉCUPÉRER L'IP DEPUIS LE LOCALSTORAGE ==========
  let gatewayFromStorage = localStorage.getItem('bkm_gateway');
  
  // ========== 3. TENTER DE DÉTECTER L'IP PAR L'URL PARENTE ==========
  let gatewayFromReferrer = null;
  if (document.referrer) {
    try {
      const referrerUrl = new URL(document.referrer);
      gatewayFromReferrer = referrerUrl.protocol + '//' + referrerUrl.hostname;
    } catch(e) {}
  }
  
  // ========== 4. TENTER DE DÉTECTER L'IP PAR LE NOM D'HÔTE ==========
  let gatewayFromHost = null;
  const hostname = window.location.hostname;
  if (!hostname.includes('github.io') && !hostname.includes('localhost')) {
    gatewayFromHost = window.location.protocol + '//' + hostname;
  }
  
  // ========== CHOISIR LA MEILLEURE SOURCE ==========
  if (gatewayFromUrl) {
    GATEWAY_URL = gatewayFromUrl;
    localStorage.setItem('bkm_gateway', GATEWAY_URL);
    document.getElementById('gatewayInfo').innerHTML = "✅ Passerelle (URL): " + GATEWAY_URL;
  } else if (gatewayFromStorage) {
    GATEWAY_URL = gatewayFromStorage;
    document.getElementById('gatewayInfo').innerHTML = "💾 Passerelle (mémoire): " + GATEWAY_URL;
  } else if (gatewayFromReferrer) {
    GATEWAY_URL = gatewayFromReferrer;
    localStorage.setItem('bkm_gateway', GATEWAY_URL);
    document.getElementById('gatewayInfo').innerHTML = "🔄 Passerelle (référent): " + GATEWAY_URL;
  } else if (gatewayFromHost) {
    GATEWAY_URL = gatewayFromHost;
    localStorage.setItem('bkm_gateway', GATEWAY_URL);
    document.getElementById('gatewayInfo').innerHTML = "🏠 Passerelle (locale): " + GATEWAY_URL;
  } else {
    document.getElementById('gatewayInfo').innerHTML = "⚠️ Passerelle non détectée";
    document.getElementById('gatewayInfo').style.color = "#ffaa00";
    document.getElementById('gatewayButtons').style.display = 'flex';
  }
  
  // ========== FERMETURE COMPLÈTE DE LA CAMÉRA ==========
  function stopCamera() {
    if (stream) {
      stream.getTracks().forEach(track => {
        if (track.readyState === 'live') {
          track.stop();
        }
      });
      stream = null;
    }
    if (video) {
      video.srcObject = null;
    }
    if (animationId) {
      cancelAnimationFrame(animationId);
      animationId = null;
    }
    if (scanRequestId) {
      cancelAnimationFrame(scanRequestId);
      scanRequestId = null;
    }
  }

  // ========== RÉINITIALISATION COMPLÈTE ==========
  function resetScanner() {
    scanning = false;
    stopCamera();
    manualMode = false;
    document.getElementById('manualArea').style.display = 'none';
    const cameraBox = document.getElementById('cameraBox');
    if (cameraBox) {
      cameraBox.style.display = 'block';
    }
    setTimeout(() => {
      initScanner();
    }, 500);
  }

  // ========== SÉLECTION MANUELLE DE LA PASSERELLE ==========
  document.querySelectorAll('.gateway-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      let ip = btn.getAttribute('data-ip');
      if (ip === 'autre') {
        ip = prompt("Entrez l'adresse IP de la passerelle:", "192.168.1.1");
        if (!ip) return;
      }
      GATEWAY_URL = 'http://' + ip;
      localStorage.setItem('bkm_gateway', GATEWAY_URL);
      document.getElementById('gatewayInfo').innerHTML = "✅ Passerelle sélectionnée: " + GATEWAY_URL;
      document.getElementById('gatewayButtons').style.display = 'none';
      resetScanner();
    });
  });
  
  // ========== CAMÉRA ==========
  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { exact: "environment" } }
      });
      return stream;
    } catch(e) {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
        return stream;
      } catch(e2) {
        throw new Error("Caméra inaccessible - Utilisez la saisie manuelle");
      }
    }
  }

  async function initScanner() {
    if (!GATEWAY_URL) {
      statusDiv.innerHTML = "⚠️ Sélectionnez d'abord la passerelle";
      statusDiv.className = "status warning";
      return;
    }
    
    if (manualMode) return;
    
    try {
      statusDiv.innerHTML = "📷 Demande d'accès à la caméra...";
      statusDiv.className = "status info";
      
      const mediaStream = await startCamera();
      video.srcObject = mediaStream;
      await video.play();
      
      statusDiv.innerHTML = "✅ Caméra active - Scannez le QR code";
      statusDiv.className = "status";
      scanning = true;
      
      function scanLoop() {
        if (!scanning || manualMode) return;
        if (video.readyState === video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
          const canvas = document.getElementById('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          
          if (typeof jsQR !== 'undefined') {
            const code = jsQR(imageData.data, canvas.width, canvas.height, {
              inversionAttempts: "dontInvert",
            });
            if (code && code.data && code.data.trim().length > 0) {
              onTicketDetected(code.data.trim());
              return;
            }
          }
        }
        scanRequestId = requestAnimationFrame(scanLoop);
      }
      
      scanLoop();
      
    } catch(err) {
      statusDiv.innerHTML = "❌ " + err.message;
      statusDiv.className = "status error";
      scanning = false;
      setTimeout(() => {
        if (!manualMode) {
          manualMode = true;
          document.getElementById('manualArea').style.display = 'block';
          document.getElementById('cameraBox').style.display = 'none';
          statusDiv.innerHTML = "📝 Saisissez votre code ticket manuellement";
          statusDiv.className = "status info";
        }
      }, 1000);
    }
  }

  // ========== TICKET DÉTECTÉ - AVEC FERMETURE CAMÉRA ==========
  function onTicketDetected(ticket) {
    if (!scanning) return;
    
    // Arrêter le scan immédiatement
    scanning = false;
    
    // Annuler les animations
    if (scanRequestId) {
      cancelAnimationFrame(scanRequestId);
      scanRequestId = null;
    }
    if (animationId) {
      cancelAnimationFrame(animationId);
      animationId = null;
    }
    
    // FERMER LA CAMÉRA
    stopCamera();
    
    // Cacher la boîte caméra
    const cameraBox = document.getElementById('cameraBox');
    if (cameraBox) {
      cameraBox.style.display = 'none';
    }
    
    statusDiv.innerHTML = "✅ Ticket trouvé: " + ticket + " → Connexion en cours...";
    statusDiv.className = "status success";
    
    localStorage.setItem('bkm_last_ticket', ticket);
    
    if (!GATEWAY_URL) {
      statusDiv.innerHTML = "❌ Erreur: Passerelle non trouvée";
      statusDiv.className = "status error";
      return;
    }
    
    const loginUrl = GATEWAY_URL + "/login";
    
    setTimeout(() => {
      window.location.href = loginUrl + "?username=" + encodeURIComponent(ticket) + "&password=" + encodeURIComponent(ticket);
    }, 800);
  }

  // ========== SAISIE MANUELLE CORRIGÉE ==========
  function manualSubmit() {
    const codeInput = document.getElementById('manualCode');
    const code = codeInput ? codeInput.value.trim() : '';
    
    if (code.length === 0) {
      statusDiv.innerHTML = "⚠️ Entrez un code ticket valide";
      statusDiv.className = "status error";
      if (codeInput) {
        codeInput.style.border = "2px solid #c62828";
        setTimeout(() => {
          codeInput.style.border = "none";
        }, 500);
      }
      return;
    }
    
    // Désactiver le bouton pour éviter double soumission
    const submitBtn = document.getElementById('submitManual');
    if (submitBtn) {
      submitBtn.disabled = true;
      submitBtn.textContent = "Connexion...";
    }
    
    // Utiliser la même fonction que le scan pour la redirection
    if (!scanning) return;
    
    // Arrêter le scan
    scanning = false;
    
    // Fermer la caméra si elle est encore active
    stopCamera();
    
    // Cacher la boîte caméra
    const cameraBox = document.getElementById('cameraBox');
    if (cameraBox) {
      cameraBox.style.display = 'none';
    }
    
    statusDiv.innerHTML = "✅ Code saisi: " + code + " → Connexion en cours...";
    statusDiv.className = "status success";
    
    localStorage.setItem('bkm_last_ticket', code);
    
    if (!GATEWAY_URL) {
      statusDiv.innerHTML = "❌ Erreur: Passerelle non trouvée";
      statusDiv.className = "status error";
      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.textContent = "✓ VALIDER";
      }
      return;
    }
    
    const loginUrl = GATEWAY_URL + "/login";
    
    setTimeout(() => {
      window.location.href = loginUrl + "?username=" + encodeURIComponent(code) + "&password=" + encodeURIComponent(code);
    }, 800);
  }

  // ========== RETOUR AU SCANNER ==========
  function backToScanner() {
    manualMode = false;
    document.getElementById('manualArea').style.display = 'none';
    document.getElementById('cameraBox').style.display = 'block';
    
    const manualInput = document.getElementById('manualCode');
    if (manualInput) {
      manualInput.value = '';
      manualInput.style.border = "none";
    }
    
    const submitBtn = document.getElementById('submitManual');
    if (submitBtn) {
      submitBtn.disabled = false;
      submitBtn.textContent = "✓ VALIDER";
    }
    
    statusDiv.innerHTML = "🔄 Redémarrage du scanner...";
    statusDiv.className = "status info";
    
    setTimeout(() => {
      initScanner();
    }, 500);
  }

  // ========== GESTIONNAIRES D'ÉVÉNEMENTS ==========
  document.getElementById('reloadBtn').onclick = () => { 
    resetScanner();
  };
  
  document.getElementById('manualBtn').onclick = () => {
    if (manualMode) return;
    
    manualMode = true;
    scanning = false;
    
    if (scanRequestId) {
      cancelAnimationFrame(scanRequestId);
      scanRequestId = null;
    }
    stopCamera();
    
    document.getElementById('cameraBox').style.display = 'none';
    document.getElementById('manualArea').style.display = 'block';
    
    const manualInput = document.getElementById('manualCode');
    if (manualInput) {
      manualInput.value = '';
      manualInput.focus();
    }
    
    statusDiv.innerHTML = "📝 Saisissez votre code ticket ci-dessous";
    statusDiv.className = "status info";
  };
  
  document.getElementById('submitManual').onclick = manualSubmit;
  
  document.getElementById('backToScanBtn').onclick = (e) => {
    e.preventDefault();
    backToScanner();
  };
  
  document.getElementById('manualCode').onkeypress = (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      manualSubmit();
    }
  };
  
  window.addEventListener('beforeunload', () => {
    stopCamera();
  });
  
  initScanner();
</script>
</body>
</html>
