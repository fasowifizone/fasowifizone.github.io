<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BF WIFI ZONE - Ticket Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel: #16213e;
            --accent: #0f3460;
            --highlight: #e94560;
            --green: #00ff88;
            --yellow: #ffd700;
            --orange: #ff8c00;
            --blue: #4da6ff;
            --gold: #c9a84c;
            --text: #e0e0e0;
            --text-dim: #999;
            --border: #2a2a4a;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh; padding: 15px;
        }
        .container { max-width: 1350px; margin: 0 auto; }

        .topbar {
            background: var(--panel); border-radius: 12px; padding: 14px 20px;
            margin-bottom: 15px; display: flex; align-items: center;
            justify-content: space-between; flex-wrap: wrap; gap: 10px;
            border: 1px solid var(--border);
        }
        .topbar h1 { color: var(--highlight); font-size: 18px; }
        .topbar-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .topbar-right input {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            padding: 7px 10px; border-radius: 5px; font-size: 12px; font-family: monospace; width: 190px;
        }
        .btn {
            padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
            font-weight: 600; font-size: 12px; transition: 0.2s; display: inline-flex; align-items: center; gap: 5px;
        }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-gold:hover { filter: brightness(1.1); }
        .btn-green { background: var(--green); color: #000; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        .btn:disabled { opacity: 0.5; pointer-events: none; }

        .status-badge {
            display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px;
            border-radius: 20px; font-size: 11px; font-weight: 600;
        }
        .status-online { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
        .status-offline { background: rgba(255,68,68,0.1); color: #ff4444; border: 1px solid rgba(255,68,68,0.3); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .dot-green { background: var(--green); box-shadow: 0 0 8px var(--green); }
        .dot-red { background: #ff4444; }

        .main-grid { display: grid; grid-template-columns: 380px 1fr; gap: 15px; }
        .panel {
            background: var(--panel); border-radius: 12px; padding: 18px;
            border: 1px solid var(--border);
        }
        .panel h3 { font-size: 15px; color: var(--gold); margin-bottom: 15px; }
        .form-group { margin-bottom: 12px; }
        .form-group label {
            display: block; font-size: 10px; color: var(--text-dim); margin-bottom: 5px;
            text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
        }
        .form-group input { width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 8px; font-size: 13px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .profiles { max-height: 180px; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
        .profile-chip {
            background: var(--bg); border: 1px solid var(--border); border-radius: 18px;
            padding: 5px 11px; font-size: 11px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 5px;
        }
        .profile-chip.selected { background: var(--gold); color: #000; border-color: var(--gold); font-weight: bold; }
        .profile-chip .badge {
            background: rgba(0,255,136,0.2); color: var(--green);
            padding: 1px 7px; border-radius: 10px; font-size: 9px;
        }

        .btn-generate {
            width: 100%; padding: 14px; background: linear-gradient(135deg, var(--gold), #e0bc4c);
            color: #000; border: none; border-radius: 10px; font-size: 15px; font-weight: bold;
            cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(201,168,76,0.3); }
        .btn-generate:disabled { filter: grayscale(0.5); transform: none; box-shadow: none; }

        .tickets-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 8px; }
        .tickets-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 12px; max-height: 58vh; overflow-y: auto; padding: 3px;
        }
        .ticket {
            background: #fff; border-radius: 12px; overflow: hidden;
            box-shadow: 0 5px 18px rgba(0,0,0,0.4); color: #111; transition: 0.3s;
        }
        .ticket:hover { transform: translateY(-3px); box-shadow: 0 10px 28px rgba(0,0,0,0.6); }
        .ticket-head {
            background: #1a3350; color: #fff; padding: 10px 15px;
            display: flex; align-items: center; gap: 10px;
        }
        .ticket-logo {
            width: 34px; height: 34px; background: var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #000; font-weight: bold;
        }
        .ticket-title { font-weight: bold; font-size: 14px; }
        .ticket-subtitle { font-size: 9px; opacity: 0.7; }
        .ticket-body {
            padding: 15px; text-align: center; background: #f8f9fa;
        }
        .ticket-label {
            font-size: 9px; color: #888; text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 4px;
        }
        .ticket-code {
            font-size: 24px; font-weight: 900; color: #1a3350;
            font-family: 'Courier New', monospace; background: #e9ecef;
            padding: 7px 15px; border-radius: 6px; display: inline-block;
            letter-spacing: 2px; word-break: break-all;
        }
        .ticket-details {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            margin-top: 12px; text-align: left;
        }
        .ticket-detail {
            background: #eef1f5; padding: 8px 10px; border-radius: 6px;
        }
        .ticket-detail .lbl { font-size: 8px; color: #888; text-transform: uppercase; }
        .ticket-detail .val { font-size: 13px; font-weight: bold; color: #1a3350; }
        .ticket-foot {
            background: #1a3350; color: #fff; padding: 7px 15px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 10px;
        }
        .ticket-foot .valid { color: var(--gold); font-weight: bold; font-size: 11px; }
        .ticket-foot .price {
            background: var(--gold); color: #000; padding: 2px 10px;
            border-radius: 12px; font-weight: bold; font-size: 12px;
        }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .overlay-box {
            background: var(--panel); padding: 30px 40px; border-radius: 14px;
            text-align: center; border: 1px solid var(--border);
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--gold); border-radius: 50%;
            animation: spin 0.7s linear infinite; margin: 0 auto 15px;
        }
        @keyframes spin { to { transform:rotate(360deg); } }

        .toast {
            position: fixed; top: 20px; right: 20px; padding: 10px 18px;
            border-radius: 6px; z-index: 2000; font-size: 13px;
            animation: slideIn 0.3s ease;
            background: var(--panel); border: 1px solid var(--border);
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity:0; } }

        .stats { display: flex; gap: 12px; margin-bottom: 15px; }
        .stat {
            flex: 1; background: var(--bg); padding: 12px; border-radius: 8px;
            text-align: center; border: 1px solid var(--border);
        }
        .stat .num { font-size: 26px; font-weight: bold; }
        .stat .lbl { font-size: 10px; color: var(--text-dim); margin-top: 3px; }
        .green { color: var(--green); } .red { color: #ff4444; } .blue { color: var(--blue); }

        .json-box {
            background: #0a0a14; border-radius: 8px; padding: 12px; margin-top: 15px;
            border: 1px solid var(--border); display: none;
        }
        .json-box pre {
            font-family: monospace; font-size: 11px; color: var(--green);
            white-space: pre-wrap; max-height: 180px; overflow: auto;
        }
        .batch-info {
            background: #0a1a0a; border: 1px solid #1a3a1a; border-radius: 6px;
            padding: 8px; margin-top: 8px; font-size: 10px; color: var(--green);
            font-family: monospace; display: none;
        }

        @media (max-width: 850px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <h1>🎫 BF WIFI ZONE · Tickets</h1>
            <div class="topbar-right">
                <input type="text" id="mikId" placeholder="MikroTik ID">
                <input type="text" id="accountKey" placeholder="Account Key">
                <button class="btn btn-gold" onclick="connect()">🔌 Connecter</button>
                <span id="connectionBadge" class="status-badge status-offline">
                    <span class="status-dot dot-red"></span> Déconnecté
                </span>
            </div>
        </div>

        <div class="main-grid">
            <div class="panel">
                <h3>⚙️ Configuration</h3>
                <div class="form-group">
                    <label>📡 Profils utilisateur</label>
                    <div class="profiles" id="profileList">
                        <span style="color:var(--text-dim);font-size:12px;">Connectez-vous pour charger</span>
                    </div>
                </div>
                <input type="hidden" id="selectedProfile">

                <div class="form-row">
                    <div class="form-group">
                        <label>⏱️ Time Limit (auto)</label>
                        <input type="text" id="timeLimit" readonly style="background:#0a1a0a;color:var(--green);border-color:#1a3a1a;">
                    </div>
                    <div class="form-group">
                        <label>💰 Prix (FCFA)</label>
                        <input type="number" id="price" value="100" min="0">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>🔢 Quantité</label>
                        <input type="number" id="quantity" value="5" min="1" max="500">
                    </div>
                    <div class="form-group">
                        <label>🏷️ Préfixe</label>
                        <input type="text" id="prefix" value="BF" maxlength="6">
                    </div>
                </div>

                <div class="form-group">
                    <label>🖥️ Nom MikroTik</label>
                    <input type="text" id="mikName" readonly style="background:#0a1a2a;color:var(--blue);border-color:#1a3a4a;">
                </div>

                <button class="btn-generate" id="btnGenerate" onclick="generateTickets()" disabled>
                    ⚡ Générer les tickets
                </button>
                <div class="batch-info" id="batchInfo">
                    🔖 Batch: <span id="batchIdDisplay"></span>
                </div>
            </div>

            <div class="panel">
                <div class="tickets-header">
                    <h3>📊 Tickets <span id="ticketCount" style="color:var(--text-dim);">(0)</span></h3>
                    <div style="display:flex;gap:6px;">
                        <button class="btn btn-outline" onclick="verifyBatch()">🔍 Vérifier</button>
                        <button class="btn btn-blue" onclick="downloadPDF()">📥 PDF</button>
                        <button class="btn btn-green" onclick="copyJSON()">📋 JSON</button>
                    </div>
                </div>

                <div class="stats" id="statsRow" style="display:none;">
                    <div class="stat"><div class="num green" id="statOk">0</div><div class="lbl">Créés</div></div>
                    <div class="stat"><div class="num red" id="statFail">0</div><div class="lbl">Échecs</div></div>
                    <div class="stat"><div class="num blue" id="statTime">0s</div><div class="lbl">Temps</div></div>
                </div>

                <div class="tickets-grid" id="ticketsGrid">
                    <div style="text-align:center;padding:40px;color:var(--text-dim);">
                        <div style="font-size:55px;">🎟️</div>
                        <p>Prêt pour la génération</p>
                    </div>
                </div>

                <div class="json-box" id="jsonBox">
                    <h4 style="color:var(--gold);margin-bottom:8px;">📄 JSON</h4>
                    <pre id="jsonOutput"></pre>
                </div>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" style="display:none;">
        <div class="overlay-box">
            <div class="spinner"></div>
            <p id="overlayMsg">Veuillez patienter...</p>
        </div>
    </div>

    <script>
        const API = 'https://fasowifizone.pythonanywhere.com';
        let mikId = localStorage.getItem('mikId') || '';
        let accountKey = localStorage.getItem('accountKey') || '';
        let connected = false, profiles = [], currentProfile = null;
        let allTickets = [], batchId = '', mikrotikName = 'BF WIFI ZONE';
        let startTime = 0;

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('mikId').value = mikId;
            document.getElementById('accountKey').value = accountKey;
        });

        function toast(msg, type='info') {
            const t = document.createElement('div');
            t.className = 'toast';
            t.style.background = type==='success' ? '#0d3d0d' : type==='error' ? '#3d0d0d' : '#1e1e3a';
            t.style.borderColor = type==='success' ? 'var(--green)' : type==='error' ? '#ff4444' : '#444';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        function overhead(show, msg='') {
            document.getElementById('overlay').style.display = show ? 'flex' : 'none';
            if (show) document.getElementById('overlayMsg').textContent = msg;
        }

        function updateBadge(online, text) {
            const badge = document.getElementById('connectionBadge');
            badge.className = 'status-badge ' + (online ? 'status-online' : 'status-offline');
            badge.innerHTML = '<span class="status-dot ' + (online ? 'dot-green' : 'dot-red') + '"></span> ' + text;
        }

        // ---- communication ----
        async function executeCommand(command) {
            const pushRes = await fetch(API + '/mik/commands/push', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    mik_id: mikId,
                    account_key: accountKey,
                    command: command,
                    type: 'script',
                    priority: 1
                })
            });
            const pushData = await pushRes.json();
            if (!pushData.success) throw new Error(pushData.message || 'push failed');

            for (let i = 0; i < 60; i++) {
                await sleep(1000);
                const statusRes = await fetch(API + '/mik/commands/status/' + pushData.command_id);
                const statusData = await statusRes.json();
                if (statusData.success && statusData.command) {
                    if (statusData.command.status === 'completed')
                        return statusData.response ? statusData.response.text : 'OK';
                    if (statusData.command.status === 'failed')
                        throw new Error('Command failed on MikroTik');
                }
            }
            throw new Error('Timeout');
        }

        // ---- analyse profils ----
        function parseProfiles(raw) {
            const result = [];
            if (!raw || raw === 'OK') return result;
            const lines = raw.split('\n');
            for (let line of lines) {
                const nameMatch = line.match(/name="([^"]+)"/);
                if (!nameMatch) continue;
                const name = nameMatch[1];
                const analysis = name.match(/^(\d+)\s*([hHdDwWmMjJ])/);
                if (!analysis) continue;
                const num = parseInt(analysis[1]);
                const letter = analysis[2].toLowerCase();
                let timeLimit = '', displayUnit = '';
                switch(letter) {
                    case 'h': timeLimit = num+'h'; displayUnit = 'h'; break;
                    case 'm': timeLimit = num+'m'; displayUnit = 'min'; break;
                    case 'd': timeLimit = num+'d'; displayUnit = 'j'; break;
                    case 'w': timeLimit = num+'w'; displayUnit = 'sem'; break;
                    case 'j': timeLimit = num+'d'; displayUnit = 'j'; break;
                    default: continue;
                }
                result.push({
                    name, timeLimit,
                    display: num+letter.toUpperCase()+' ('+num+displayUnit+')',
                    number: num, letter
                });
            }
            const order = {m:1, h:2, d:3, w:4, j:3};
            result.sort((a,b) => (order[a.letter]||9) - (order[b.letter]||9) || a.number - b.number);
            return result;
        }

        function renderProfiles() {
            const container = document.getElementById('profileList');
            if (!profiles.length) {
                container.innerHTML = '<span style="color:#ff8c00;font-size:12px;">Aucun profil compatible (chiffre+h/d/w/m)</span>';
                return;
            }
            container.innerHTML = profiles.map((p,i) => `
                <div class="profile-chip ${i===0?'selected':''}" onclick="selectProfile('${p.name}', this)">
                    ${p.name} <span class="badge">${p.display}</span>
                </div>
            `).join('');
            selectProfile(profiles[0].name, container.querySelector('.profile-chip'));
        }

        function selectProfile(name, element) {
            document.querySelectorAll('.profile-chip').forEach(c => c.classList.remove('selected'));
            if (element) element.classList.add('selected');
            document.getElementById('selectedProfile').value = name;
            currentProfile = profiles.find(p => p.name === name);
            if (currentProfile) {
                document.getElementById('timeLimit').value = currentProfile.timeLimit;
            }
        }

        // ---- connexion ----
        async function connect() {
            mikId = document.getElementById('mikId').value.trim();
            accountKey = document.getElementById('accountKey').value.trim();
            if (!mikId || !accountKey) { toast('Veuillez remplir les identifiants', 'error'); return; }
            localStorage.setItem('mikId', mikId);
            localStorage.setItem('accountKey', accountKey);

            updateBadge(false, 'Connexion...');
            overhead(true, 'Connexion et chargement des profils...');

            try {
                const healthRes = await fetch(API + '/health');
                const healthData = await healthRes.json();
                if (healthData.api !== 'healthy') throw new Error('API pas prête');

                const rawProfiles = await executeCommand('/ip hotspot user profile print');
                profiles = parseProfiles(rawProfiles);
                renderProfiles();

                try {
                    const rawId = await executeCommand('/system identity print');
                    const m = rawId.match(/name="([^"]+)"/);
                    mikrotikName = m ? m[1] : 'BF WIFI ZONE';
                } catch { mikrotikName = 'MikroTik'; }
                document.getElementById('mikName').value = mikrotikName;

                connected = true;
                document.getElementById('btnGenerate').disabled = false;
                updateBadge(true, 'Connecté · '+profiles.length+' profils');
                overhead(false);
                toast('✅ Connecté ! '+profiles.length+' profils chargés', 'success');
            } catch(e) {
                connected = false;
                document.getElementById('btnGenerate').disabled = true;
                updateBadge(false, 'Échec');
                overhead(false);
                toast('❌ '+e.message, 'error');
            }
        }

        // ---- génération BATCH (une seule commande) ----
        async function generateTickets() {
            if (!connected) { toast('Connectez-vous', 'error'); return; }
            const profile = document.getElementById('selectedProfile').value;
            const timeLimit = document.getElementById('timeLimit').value;
            const price = parseInt(document.getElementById('price').value) || 100;
            const quantity = parseInt(document.getElementById('quantity').value) || 5;
            const prefix = document.getElementById('prefix').value.trim() || 'BF';
            if (!profile) { toast('Sélectionnez un profil', 'error'); return; }

            // Création du batch ID
            const now = new Date();
            batchId = 'B' +
                String(now.getFullYear()).slice(2) +
                String(now.getMonth()+1).padStart(2,'0') +
                String(now.getDate()).padStart(2,'0') +
                String(now.getHours()).padStart(2,'0') +
                String(now.getMinutes()).padStart(2,'0') +
                String(now.getSeconds()).padStart(2,'0');

            document.getElementById('batchIdDisplay').textContent = batchId;
            document.getElementById('batchInfo').style.display = 'block';
            startTime = Date.now();

            document.getElementById('btnGenerate').disabled = true;
            updateBadge(true, 'Génération...');
            overhead(true, 'Création des tickets en batch...');

            try {
                // Étape 1 : envoyer une seule commande qui crée un script, l'exécute et le supprime
                const createScript = '/system script add name="BFGEN" source="' +
                    ':local p \\"' + profile + '\\"; ' +
                    ':local t \\"' + timeLimit + '\\"; ' +
                    ':local q ' + quantity + '; ' +
                    ':local x \\"' + prefix + '\\"; ' +
                    ':local r ' + price + '; ' +
                    ':local b \\"' + batchId + '\\"; ' +
                    ':local s 0; ' +
                    ':local chars \\"ABCDEFGHJKLMNPQRSTUVWXYZ23456789\\"; ' +
                    ':while ($s < $q) do={ ' +
                        ':local code \\"\\"; ' +
                        ':for i from=1 to=6 do={ :set $code ($code . [:pick $chars ([:rndnum from=0 to=31])]) }; ' +
                        ':local name ($x . $code); ' +
                        ':local comment (\\"type=voucher|profile=\\" . $p . \\"|limit=\\" . $t . \\"|price=\\" . $r . \\"|batch=\\" . $b); ' +
                        ':do { ' +
                            '/ip hotspot user add name=$name password=$name profile=$p limit-uptime=$t comment=$comment; ' +
                            ':set $s ($s + 1); ' +
                        '} on-error={ :set $q ($q + 1) } ' +
                    '}; ' +
                    ':put (\\"SUCCESS:\\" . $s)' +
                '"; /system script run BFGEN; /system script remove BFGEN';

                const batchResult = await executeCommand(createScript);
                console.log('Batch result:', batchResult);

                // Étape 2 : récupérer les utilisateurs créés avec le batch_id
                overhead(true, 'Récupération des tickets...');
                const rawUsers = await executeCommand('/ip hotspot user print detail where comment~"' + batchId + '"');

                // Parser les utilisateurs
                allTickets = [];
                if (rawUsers && rawUsers !== 'OK') {
                    const blocks = rawUsers.split(/\n\s*\d+\s+/).filter(b => b.trim());
                    for (let block of blocks) {
                        const nm = block.match(/name="([^"]+)"/);
                        const pm = block.match(/password="([^"]+)"/);
                        if (!nm) continue;
                        allTickets.push({
                            name: nm[1],
                            password: pm ? pm[1] : nm[1],
                            profile, timeLimit, price, type: 'voucher'
                        });
                    }
                }

                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                overhead(false);
                document.getElementById('btnGenerate').disabled = false;
                updateBadge(true, 'OK · '+allTickets.length+' tickets');

                document.getElementById('statsRow').style.display = 'flex';
                document.getElementById('statOk').textContent = allTickets.length;
                document.getElementById('statFail').textContent = quantity - allTickets.length;
                document.getElementById('statTime').textContent = elapsed + 's';
                document.getElementById('ticketCount').textContent = '('+allTickets.length+')';

                renderTickets();
                document.getElementById('jsonBox').style.display = 'block';
                document.getElementById('jsonOutput').textContent = JSON.stringify({
                    batch_id: batchId,
                    mikrotik: mikrotikName,
                    profile, timeLimit, price,
                    requested: quantity,
                    created: allTickets.length,
                    failed: quantity - allTickets.length,
                    elapsed_seconds: parseFloat(elapsed),
                    tickets: allTickets
                }, null, 2);

                toast('✅ '+allTickets.length+' tickets générés en '+elapsed+'s (batch)', 'success');
            } catch(e) {
                overhead(false);
                document.getElementById('btnGenerate').disabled = false;
                updateBadge(true, 'Erreur');
                toast('❌ '+e.message, 'error');
            }
        }

        // ---- vérification ----
        async function verifyBatch() {
            if (!batchId) { toast('Aucun batch à vérifier', 'error'); return; }
            if (!connected) { toast('Connectez-vous', 'error'); return; }
            overhead(true, 'Vérification...');
            try {
                const raw = await executeCommand('/ip hotspot user print detail where comment~"' + batchId + '"');
                const price = parseInt(document.getElementById('price').value) || 100;
                const timeLimit = document.getElementById('timeLimit').value;
                const profile = document.getElementById('selectedProfile').value;

                allTickets = [];
                if (raw && raw !== 'OK') {
                    const blocks = raw.split(/\n\s*\d+\s+/).filter(b => b.trim());
                    for (let block of blocks) {
                        const nm = block.match(/name="([^"]+)"/);
                        const pm = block.match(/password="([^"]+)"/);
                        if (!nm) continue;
                        allTickets.push({
                            name: nm[1],
                            password: pm ? pm[1] : nm[1],
                            profile, timeLimit, price, type: 'voucher'
                        });
                    }
                }

                overhead(false);
                document.getElementById('statsRow').style.display = 'flex';
                document.getElementById('statOk').textContent = allTickets.length;
                document.getElementById('ticketCount').textContent = '('+allTickets.length+')';
                renderTickets();
                document.getElementById('jsonBox').style.display = 'block';
                document.getElementById('jsonOutput').textContent = JSON.stringify({
                    batch_id: batchId, tickets: allTickets
                }, null, 2);
                toast('✅ '+allTickets.length+' tickets trouvés', 'success');
            } catch(e) {
                overhead(false);
                toast('❌ '+e.message, 'error');
            }
        }

        // ---- rendu ----
        function renderTickets() {
            const grid = document.getElementById('ticketsGrid');
            if (!allTickets.length) {
                grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);">Aucun ticket</div>';
                return;
            }
            grid.innerHTML = allTickets.map((t,i) => `
                <div class="ticket" id="t-${i}">
                    <div class="ticket-head">
                        <div class="ticket-logo">📶</div>
                        <div>
                            <div class="ticket-title">${esc(mikrotikName)}</div>
                            <div class="ticket-subtitle">Accès Internet Haut Débit</div>
                        </div>
                    </div>
                    <div class="ticket-body">
                        <div class="ticket-label">Code d'accès</div>
                        <div class="ticket-code">${esc(t.name)}</div>
                        <div class="ticket-details">
                            <div class="ticket-detail"><div class="lbl">⏱️ Validité</div><div class="val">${esc(t.timeLimit)}</div></div>
                            <div class="ticket-detail"><div class="lbl">📋 Profil</div><div class="val">${esc(t.profile)}</div></div>
                        </div>
                    </div>
                    <div class="ticket-foot">
                        <span class="valid">🕐 ${esc(t.timeLimit)}</span>
                        <span class="price">${t.price} FCFA</span>
                    </div>
                </div>
            `).join('');
        }

        function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        // ---- PDF ----
        async function downloadPDF() {
            if (!allTickets.length) { toast('Aucun ticket', 'error'); return; }
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            for (let i = 0; i < allTickets.length; i++) {
                const el = document.getElementById('t-'+i);
                if (!el) continue;
                if (i > 0) pdf.addPage();
                const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#ffffff' });
                const w = pdf.internal.pageSize.getWidth() - 20;
                const h = (canvas.height * w) / canvas.width;
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 15, w, h);
            }
            pdf.save('BF_WIFI_Tickets_' + batchId + '.pdf');
            toast('📥 PDF téléchargé', 'success');
        }

        function copyJSON() {
            const json = document.getElementById('jsonOutput').textContent;
            navigator.clipboard.writeText(json).then(() => toast('📋 JSON copié', 'success'));
        }
    </script>
</body>
</html>
