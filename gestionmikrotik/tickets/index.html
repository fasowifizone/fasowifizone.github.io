<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BF WIFI ZONE - Ticket Generator v3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --bg: #0a0a14; --panel: #12122a; --gold: #c9a84c;
            --green: #00ff88; --red: #ff4444; --blue: #4da6ff;
            --text: #e0e0e0; --text-dim: #888; --border: #2a2a4a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh; padding: 15px;
        }
        .container { max-width: 1300px; margin: 0 auto; }

        .topbar {
            background: linear-gradient(135deg, #1a1a3e, #2a1a4e);
            border-radius: 15px; padding: 15px 25px; margin-bottom: 15px;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 10px; border: 1px solid var(--border);
        }
        .topbar h1 { font-size: 20px; background: linear-gradient(90deg, var(--gold), #f0d060); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .topbar-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .topbar-right input {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            padding: 8px 12px; border-radius: 6px; font-size: 12px; font-family: monospace; width: 190px;
        }
        .btn {
            padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
            font-weight: 600; font-size: 12px; transition: all 0.2s;
        }
        .btn-gold { background: linear-gradient(135deg, var(--gold), #f0d060); color: #000; }
        .btn-gold:hover { box-shadow: 0 0 20px rgba(201,168,76,0.4); }
        .btn-green { background: var(--green); color: #000; }
        .btn-blue { background: var(--blue); color: #000; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .pill {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
        }
        .pill-on { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
        .pill-off { background: rgba(255,68,68,0.1); color: var(--red); border: 1px solid rgba(255,68,68,0.3); }
        .pill-busy { background: rgba(255,200,0,0.1); color: #ffd700; border: 1px solid rgba(255,200,0,0.3); }

        .main-grid { display: grid; grid-template-columns: 380px 1fr; gap: 15px; }

        .panel {
            background: var(--panel); border-radius: 12px; padding: 18px;
            border: 1px solid var(--border);
        }
        .panel h3 { font-size: 15px; margin-bottom: 15px; color: var(--gold); }
        .form-group { margin-bottom: 12px; }
        .form-group label {
            display: block; font-size: 10px; color: var(--text-dim); margin-bottom: 4px;
            font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
        }
        .form-group select, .form-group input {
            width: 100%; padding: 10px 12px; background: var(--bg);
            border: 1px solid var(--border); color: var(--text); border-radius: 8px;
            font-size: 13px; font-family: inherit;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .profiles-list { max-height: 180px; overflow-y: auto; margin-top: 6px; }
        .profile-chip {
            display: inline-block; padding: 5px 10px; background: var(--bg);
            border: 1px solid var(--border); border-radius: 15px; margin: 3px;
            font-size: 11px; cursor: pointer; transition: all 0.2s;
        }
        .profile-chip.selected { background: var(--gold); color: #000; border-color: var(--gold); font-weight: bold; }
        .profile-chip .badge {
            background: rgba(0,255,136,0.2); color: var(--green);
            padding: 2px 6px; border-radius: 10px; font-size: 9px; margin-left: 4px;
        }

        .btn-big {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, var(--gold), #f0d060);
            color: #000; border: none; border-radius: 10px;
            font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px;
            transition: all 0.3s;
        }
        .btn-big:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(201,168,76,0.3); }
        .btn-big:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .tickets-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; flex-wrap: wrap; gap: 10px;
        }
        .tickets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 12px; max-height: 55vh; overflow-y: auto; padding: 3px;
        }

        .ticket {
            background: white; border-radius: 12px; overflow: hidden;
            font-family: 'Arial', sans-serif; box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.3s; color: #000;
        }
        .ticket:hover { transform: translateY(-3px); }
        .ticket-top {
            background: linear-gradient(135deg, #1a3a5c, #0d2137);
            color: white; padding: 12px 15px; display: flex; align-items: center; gap: 10px;
        }
        .ticket-logo {
            width: 36px; height: 36px; background: var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #000; font-weight: bold;
        }
        .ticket-company { font-weight: bold; font-size: 14px; }
        .ticket-subtitle { font-size: 9px; opacity: 0.7; }
        .ticket-body {
            padding: 15px; text-align: center;
            background: linear-gradient(180deg, #fff, #f8f9fa);
        }
        .ticket-label {
            font-size: 9px; color: #888; text-transform: uppercase;
            letter-spacing: 2px; margin-bottom: 3px;
        }
        .ticket-code {
            font-size: 22px; font-weight: 900; color: #1a3a5c;
            letter-spacing: 3px; font-family: 'Courier New', monospace;
            background: #f0f0f0; padding: 8px 15px; border-radius: 6px;
            display: inline-block; word-break: break-all;
        }
        .ticket-details {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
            margin-top: 12px; text-align: left;
        }
        .ticket-detail {
            background: #f0f4f8; padding: 8px 10px; border-radius: 6px;
        }
        .ticket-detail .l { font-size: 8px; color: #888; text-transform: uppercase; }
        .ticket-detail .v { font-size: 13px; font-weight: bold; color: #1a3a5c; }
        .ticket-bottom {
            background: #1a3a5c; color: white; padding: 8px 15px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 9px;
        }
        .ticket-validity { color: var(--gold); font-weight: bold; font-size: 11px; }
        .ticket-price {
            background: var(--gold); color: #000;
            padding: 3px 10px; border-radius: 12px; font-weight: bold; font-size: 12px;
        }

        .overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); display: flex;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .overlay-box {
            background: var(--panel); padding: 30px; border-radius: 15px;
            text-align: center; border: 1px solid var(--border);
        }
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid var(--border); border-top: 3px solid var(--gold);
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .toast {
            position: fixed; top: 20px; right: 20px;
            padding: 12px 20px; background: var(--panel);
            border: 1px solid var(--border); border-radius: 8px;
            z-index: 2000; font-size: 13px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .stats { display: flex; gap: 15px; margin-bottom: 15px; display: none; }
        .stat {
            flex: 1; background: var(--bg); padding: 12px;
            border-radius: 8px; text-align: center; border: 1px solid var(--border);
        }
        .stat .num { font-size: 28px; font-weight: bold; }
        .stat .lbl { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
        .stat .num.g { color: var(--green); }
        .stat .num.r { color: var(--red); }
        .stat .num.b { color: var(--blue); }

        .json-box {
            margin-top: 15px; background: #0a0a14; border-radius: 8px;
            padding: 15px; border: 1px solid var(--border); display: none;
        }
        .json-box pre {
            font-family: monospace; font-size: 11px; color: var(--green);
            max-height: 200px; overflow: auto; white-space: pre-wrap;
        }
        .info-box {
            background: #0a1a0a; border: 1px solid #1a3a1a; border-radius: 8px;
            padding: 10px; margin-top: 10px; font-size: 10px;
            color: var(--green); font-family: monospace; display: none;
        }

        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topbar">
            <h1>🎫 BF WIFI ZONE • Ticket Generator</h1>
            <div class="topbar-right">
                <input type="text" id="mikIdInput" placeholder="MikroTik ID">
                <input type="text" id="accountKeyInput" placeholder="Account Key">
                <button class="btn btn-gold" onclick="connect()">🔌 Connecter</button>
                <span id="pill" class="pill pill-off">● Déconnecté</span>
            </div>
        </div>

        <div class="main-grid">
            <div class="panel">
                <h3>⚙️ Configuration</h3>

                <div class="form-group">
                    <label>📋 Profil</label>
                    <div class="profiles-list" id="profilesList">
                        <span style="color:var(--text-dim);">Connectez-vous...</span>
                    </div>
                </div>
                <input type="hidden" id="selectedProfile">

                <div class="form-row">
                    <div class="form-group">
                        <label>⏱️ Time Limit</label>
                        <input type="text" id="timeLimit" readonly style="background:#0a1a0a;color:var(--green);">
                    </div>
                    <div class="form-group">
                        <label>💰 Prix (FCFA)</label>
                        <input type="number" id="price" value="100">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>🔢 Quantité</label>
                        <input type="number" id="quantity" value="5" min="1" max="500">
                    </div>
                    <div class="form-group">
                        <label>🏷️ Préfixe</label>
                        <input type="text" id="prefix" value="BF" maxlength="6">
                    </div>
                </div>

                <div class="form-group">
                    <label>🖥️ Nom MikroTik</label>
                    <input type="text" id="mikName" readonly style="background:#0a1a1a;color:var(--blue);">
                </div>

                <button class="btn-big" id="btnGenerate" onclick="generate()" disabled>
                    ⚡ GÉNÉRER LES TICKETS
                </button>
                <div class="info-box" id="infoBox">
                    🔖 <span id="batchIdDisplay"></span>
                </div>
            </div>

            <div class="panel">
                <div class="tickets-header">
                    <h3>📊 Tickets <span id="ticketCount" style="color:var(--text-dim);">(0)</span></h3>
                    <div style="display:flex;gap:6px;">
                        <button class="btn btn-gold" onclick="verify()">🔍 Vérifier</button>
                        <button class="btn btn-blue" onclick="downloadPDF()">📥 PDF</button>
                        <button class="btn btn-green" onclick="copyJSON()">📋 JSON</button>
                    </div>
                </div>

                <div class="stats" id="statsRow">
                    <div class="stat"><div class="num g" id="statOk">0</div><div class="lbl">Créés</div></div>
                    <div class="stat"><div class="num r" id="statFail">0</div><div class="lbl">Échecs</div></div>
                    <div class="stat"><div class="num b" id="statTime">0s</div><div class="lbl">Temps</div></div>
                </div>

                <div class="tickets-grid" id="ticketsGrid">
                    <div style="text-align:center;padding:40px;color:var(--text-dim);">
                        <div style="font-size:60px;">🎫</div>
                        <p>Prêt pour la génération</p>
                    </div>
                </div>

                <div class="json-box" id="jsonBox">
                    <h4 style="color:var(--gold);margin-bottom:8px;">📄 JSON</h4>
                    <pre id="jsonOutput"></pre>
                </div>
            </div>
        </div>
    </div>

    <div class="overlay" id="overlay" style="display:none;">
        <div class="overlay-box">
            <div class="spinner"></div>
            <p id="overlayText">Traitement...</p>
            <p style="font-size:11px;color:var(--text-dim);" id="overlayStep"></p>
        </div>
    </div>

    <script>
        const API = 'https://fasowifizone.pythonanywhere.com';
        let mikId = '', accountKey = '', connected = true;
        let profiles = [], selectedProfile = null;
        let allTickets = [], mikrotikName = '', currentBatchId = '';
        let startTime = 0;

        // INIT
        document.addEventListener('DOMContentLoaded', () => {
            mikId = localStorage.getItem('mikId') || 'f5b4edea-a263-4b7a-866e-eb97da411f26';
            accountKey = localStorage.getItem('accountKey') || '689872a3-a221-4842-9aaa-761eff2eee05';
            document.getElementById('mikIdInput').value = mikId;
            document.getElementById('accountKeyInput').value = accountKey;
        });

        // ==================== ANALYSE PROFILS ====================
        function analyzeProfile(name) {
            const m = name.match(/^(\d+)\s*([hHdDwWmMjJ])/);
            if (!m) return null;
            const n = parseInt(m[1]), l = m[2].toLowerCase();
            let tl = '', u = '';
            switch(l) { case 'h': tl=n+'h'; u='H'; break; case 'm': tl=n+'m'; u='Min'; break; case 'd': tl=n+'d'; u='J'; break; case 'w': tl=n+'w'; u='S'; break; case 'j': tl=n+'d'; u='J'; break; default: return null; }
            return { number:n, letter:l, timeLimit:tl, unit:u, display:n+l.toUpperCase()+' - '+n+u };
        }

        function parseProfiles(raw) {
            const p = [];
            if (!raw || raw === 'OK') return p;
            raw.split('\n').forEach(line => {
                const nm = line.match(/name="([^"]+)"/);
                if (nm) { const a = analyzeProfile(nm[1]); if (a) p.push({ name:nm[1], isDefault:line.includes('*'), ...a }); }
            });
            const o = { m:1, h:2, d:3, w:4, j:3 };
            p.sort((a,b) => (o[a.letter]||99)-(o[b.letter]||99) || a.number-b.number);
            return p;
        }

        function renderProfiles() {
            const c = document.getElementById('profilesList');
            if (!profiles.length) { c.innerHTML = '<span style="color:#ff8c00;">⚠️ Aucun profil détecté</span>'; return; }
            c.innerHTML = profiles.map((p,i) => `<span class="profile-chip ${i===0?'selected':''}" onclick="selectProfile('${p.name}',this)">${p.name}<span class="badge">${p.display}</span></span>`).join('');
            selectProfile(profiles[0].name, c.querySelector('.profile-chip'));
        }

        function selectProfile(name, el) {
            document.querySelectorAll('.profile-chip').forEach(c => c.classList.remove('selected'));
            if (el) el.classList.add('selected');
            document.getElementById('selectedProfile').value = name;
            selectedProfile = profiles.find(p => p.name === name);
            if (selectedProfile) document.getElementById('timeLimit').value = selectedProfile.timeLimit;
        }

        // ==================== CONNEXION ====================
        async function connect() {
            mikId = document.getElementById('mikIdInput').value.trim();
            accountKey = document.getElementById('accountKeyInput').value.trim();
            if (!mikId || !accountKey) { toast('❌ ID et Key requis', 'error'); return; }
            localStorage.setItem('mikId', mikId); localStorage.setItem('accountKey', accountKey);
            pill('busy', 'Analyse...');
            try {
                const raw = await exec('/ip hotspot user profile print');
                profiles = parseProfiles(raw);
                renderProfiles();
                try { const ir = await exec('/system identity print'); const im = ir.match(/name="([^"]+)"/); mikrotikName = im ? im[1] : 'MikroTik'; } catch {}
                document.getElementById('mikName').value = mikrotikName;
                connected = true;
                document.getElementById('btnGenerate').disabled = false;
                pill('on', 'OK • '+profiles.length+' profils');
                toast('✅ Connecté ! '+profiles.length+' profils', 'success');
            } catch(e) {
                connected = false; document.getElementById('btnGenerate').disabled = true;
                pill('off', 'Échec'); toast('❌ '+e.message, 'error');
            }
        }

        function pill(s, t) {
            const p = document.getElementById('pill');
            p.className = 'pill ' + (s==='on'?'pill-on':s==='off'?'pill-off':'pill-busy');
            p.innerHTML = (s==='busy'?'⏳ ':'● ') + t;
        }

        // ==================== EXEC ====================
        async function exec(cmd) {
            const pr = await fetch(API+'/mik/commands/push', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({ mik_id:mikId, account_key:accountKey, command:cmd, type:'script', priority:1 })
            });
            const pd = await pr.json();
            if (!pd.success) throw new Error(pd.message);
            for (let i=0;i<90;i++) {
                await sleep(1000);
                const sr = await fetch(API+'/mik/commands/status/'+pd.command_id);
                const sd = await sr.json();
                if (sd.success && sd.command) {
                    if (sd.command.status==='completed') return sd.response ? sd.response.text : 'OK';
                    if (sd.command.status==='failed') throw new Error('Échec');
                }
            }
            throw new Error('Timeout');
        }

        // ==================== GÉNÉRATION ====================
        async function generate() {
            if (!connected) { toast('❌ Connectez-vous', 'error'); return; }
            const profile = document.getElementById('selectedProfile').value;
            const timeLimit = document.getElementById('timeLimit').value;
            const price = document.getElementById('price').value;
            const quantity = document.getElementById('quantity').value;
            const prefix = document.getElementById('prefix').value.trim() || 'BF';
            if (!profile) { toast('❌ Profil requis', 'error'); return; }

            // Batch ID
            const d = new Date();
            currentBatchId = 'B' + String(d.getFullYear()).substring(2) + 
                String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0') +
                String(d.getHours()).padStart(2,'0') + String(d.getMinutes()).padStart(2,'0') +
                String(d.getSeconds()).padStart(2,'0');
            document.getElementById('batchIdDisplay').textContent = currentBatchId;
            document.getElementById('infoBox').style.display = 'block';
            startTime = Date.now();

            overlay(true, '⚡ Génération en cours...', 'Création des tickets sur le MikroTik');
            document.getElementById('btnGenerate').disabled = true;
            pill('busy', 'Génération...');

            try {
                // UNE SEULE COMMANDE : script temporaire sur MikroTik
                const scriptSource = ':local p "' + profile + '"; :local t "' + timeLimit + '"; :local q ' + quantity + '; :local x "' + prefix + '"; :local r ' + price + '; :local b "' + currentBatchId + '"; :local s 0; :local c "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; :while ($s < $q) do={:local d ""; :for i from=1 to=6 do={:set $d ($d . [:pick $c ([:rndnum from=0 to=31])])}; :local n ($x . $d); :do {/ip hotspot user add name=$n password=$n profile=$p limit-uptime=$t comment=("type=voucher|profile=" . $p . "|limit=" . $t . "|price=" . $r . "|batch=" . $b)} on-error={:set $q ($q + 1)}; :set $s ($s + 1)}; :put ($s . " tickets created")';
                
                await exec('/system script add name="BFGEN" source="' + scriptSource.replace(/"/g, '\\"') + '"');
                const result = await exec('/system script run BFGEN');
                await exec('/system script remove BFGEN');

                // Récupérer les users créés
                overlay(true, '📥 Récupération...', 'Recherche par batch_id');
                const rawUsers = await exec('/ip hotspot user print detail where comment~"' + currentBatchId + '"');
                
                // Parser
                allTickets = parseUsers(rawUsers, price, timeLimit, profile);
                
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

                overlay(false);
                document.getElementById('btnGenerate').disabled = false;
                pill('on', 'OK • ' + allTickets.length + ' tickets');

                document.getElementById('statsRow').style.display = 'flex';
                document.getElementById('statOk').textContent = allTickets.length;
                document.getElementById('statFail').textContent = quantity - allTickets.length;
                document.getElementById('statTime').textContent = elapsed + 's';
                document.getElementById('ticketCount').textContent = '(' + allTickets.length + ')';

                renderTickets();
                document.getElementById('jsonBox').style.display = 'block';
                document.getElementById('jsonOutput').textContent = JSON.stringify({
                    batch_id: currentBatchId,
                    mikrotik: mikrotikName,
                    profile, timeLimit, price,
                    requested: parseInt(quantity),
                    created: allTickets.length,
                    elapsed_seconds: parseFloat(elapsed),
                    tickets: allTickets
                }, null, 2);

                toast('✅ ' + allTickets.length + ' tickets en ' + elapsed + 's !', 'success');
            } catch(e) {
                overlay(false);
                document.getElementById('btnGenerate').disabled = false;
                pill('on', 'Erreur');
                toast('❌ ' + e.message, 'error');
            }
        }

        function parseUsers(raw, price, timeLimit, profile) {
            const tickets = [];
            if (!raw || raw === 'OK') return tickets;
            const blocks = raw.split(/\n\s*\d+\s+/);
            blocks.forEach(block => {
                if (!block.trim()) return;
                const nm = block.match(/name="([^"]+)"/);
                const pm = block.match(/password="([^"]+)"/);
                const lm = block.match(/limit-uptime="?([^"\s]+)"?/);
                if (nm) tickets.push({
                    name: nm[1],
                    password: pm ? pm[1] : nm[1],
                    profile: profile,
                    timeLimit: lm ? lm[1] : timeLimit,
                    price: parseInt(price),
                    type: 'voucher'
                });
            });
            return tickets;
        }

        // ==================== VÉRIFICATION ====================
        async function verify() {
            if (!currentBatchId) { toast('❌ Générez d\'abord', 'error'); return; }
            if (!connected) { toast('❌ Connectez-vous', 'error'); return; }
            overlay(true, '🔍 Vérification...');
            try {
                const raw = await exec('/ip hotspot user print detail where comment~"' + currentBatchId + '"');
                allTickets = parseUsers(raw, document.getElementById('price').value, document.getElementById('timeLimit').value, document.getElementById('selectedProfile').value);
                overlay(false);
                document.getElementById('statOk').textContent = allTickets.length;
                document.getElementById('statsRow').style.display = 'flex';
                document.getElementById('ticketCount').textContent = '(' + allTickets.length + ')';
                renderTickets();
                document.getElementById('jsonBox').style.display = 'block';
                document.getElementById('jsonOutput').textContent = JSON.stringify({ batch_id: currentBatchId, tickets: allTickets }, null, 2);
                toast('✅ ' + allTickets.length + ' tickets trouvés', 'success');
            } catch(e) { overlay(false); toast('❌ '+e.message, 'error'); }
        }

        // ==================== RENDER ====================
        function renderTickets() {
            const g = document.getElementById('ticketsGrid');
            if (!allTickets.length) { g.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);">Aucun ticket</div>'; return; }
            g.innerHTML = allTickets.map((t,i) => `
                <div class="ticket" id="t-${i}">
                    <div class="ticket-top">
                        <div class="ticket-logo">📶</div>
                        <div><div class="ticket-company">${esc(mikrotikName||'BF WIFI ZONE')}</div><div class="ticket-subtitle">Internet Haut Débit</div></div>
                    </div>
                    <div class="ticket-body">
                        <div class="ticket-label">Code d'accès</div>
                        <div class="ticket-code">${esc(t.name)}</div>
                        <div class="ticket-details">
                            <div class="ticket-detail"><div class="l">⏱️ Validité</div><div class="v">${esc(t.timeLimit)}</div></div>
                            <div class="ticket-detail"><div class="l">📋 Profil</div><div class="v">${esc(t.profile)}</div></div>
                        </div>
                    </div>
                    <div class="ticket-bottom">
                        <span class="ticket-validity">🕐 ${esc(t.timeLimit)}</span>
                        <span class="ticket-price">${t.price} FCFA</span>
                    </div>
                </div>
            `).join('');
        }

        // ==================== PDF ====================
        async function downloadPDF() {
            if (!allTickets.length) { toast('❌ Aucun ticket', 'error'); return; }
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            for (let i=0;i<allTickets.length;i++) {
                const el = document.getElementById('t-'+i);
                if (!el) continue;
                if (i>0) pdf.addPage();
                const canvas = await html2canvas(el, { scale:2, backgroundColor:'#ffffff' });
                const img = canvas.toDataURL('image/png');
                const w = pdf.internal.pageSize.getWidth()-20;
                const h = (canvas.height*w)/canvas.width;
                pdf.addImage(img, 'PNG', 10, (pdf.internal.pageSize.getHeight()-h)/2, w, h);
            }
            pdf.save('BF_WIFI_Tickets_'+currentBatchId+'.pdf');
            toast('📥 PDF téléchargé !', 'success');
        }

        function copyJSON() {
            navigator.clipboard.writeText(document.getElementById('jsonOutput').textContent)
                .then(() => toast('📋 JSON copié !', 'success'));
        }

        // ==================== UTILS ====================
        function overlay(show, text, step) {
            document.getElementById('overlay').style.display = show ? 'flex' : 'none';
            if (show) {
                document.getElementById('overlayText').textContent = text || '';
                document.getElementById('overlayStep').textContent = step || '';
            }
        }
        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
        function esc(t) { if (!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function toast(msg, type) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.style.cssText = 'background:'+(type==='success'?'#0d3d0d':'#3d0d0d')+';';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }
    </script>
</body>
</html>
